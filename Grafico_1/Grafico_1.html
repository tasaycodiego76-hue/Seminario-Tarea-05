<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico 1 - Lenguajes de Programación</title>
</head>
<body>

    <div style="width: 50%;">
        <canvas id="lienzo"></canvas>
    </div>

    <br>
    <label>Python:     <input type="number" id="python"     value="0"></label><br><br>
    <label>JavaScript: <input type="number" id="javascript" value="0"></label><br><br>
    <label>PHP:        <input type="number" id="php"        value="0"></label><br><br>
    <label>Java:       <input type="number" id="java"       value="0"></label><br><br>
    <label>Ruby:       <input type="number" id="ruby"       value="0"></label><br><br>

    <button type="submit" id="actualizar">Actualizar Gráfico</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const btnActualizar = document.getElementById('actualizar')
        const lienzo = document.getElementById('lienzo')

        btnActualizar.addEventListener("click", actualizarGrafico)

        function actualizarGrafico() {
            grafico.data.datasets[0].data = [
                Number(document.getElementById('python').value),
                Number(document.getElementById('javascript').value),
                Number(document.getElementById('php').value),
                Number(document.getElementById('java').value),
                Number(document.getElementById('ruby').value),
            ]
            grafico.update()
        }

        const grafico = new Chart(lienzo, {
            type: 'bar',
            data: {
                labels: ['Python', 'JavaScript', 'PHP', 'Java', 'Ruby'],
                datasets: [
                    {
                        data: [0, 0, 0, 0, 0],
                        label: 'Popularidad de lenguajes',
                        backgroundColor: ["rgba(46, 204, 113, 0.2)"]
                    }
                ]
            },
        })

        console.log(grafico.data)
    })
</script>
</body>
</html>
